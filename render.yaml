services:
  - type: web
    name: trading-ai-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: BINANCE_TESTNET
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: AUTO_TRADE_ENABLED
        value: "true"
      - key: MAX_DAILY_LOSS_PERCENT
        value: "3"
      - key: RISK_PER_TRADE_PERCENT
        value: "1.5"
      - key: MIN_ML_SCORE
        value: "70"
      - key: MIN_CONFIDENCE
        value: "80"
      - key: MAX_OPEN_POSITIONS
        value: "5"
      - key: COOLDOWN_MINUTES
        value: "15"
    healthCheckPath: /api/health
    autoDeploy: true
