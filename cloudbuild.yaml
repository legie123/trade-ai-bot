# ============================================================
# PHOENIX V2 — Google Cloud Build Configuration
# Builds Docker image and deploys to Cloud Run automatically.
#
# Trigger: Push to main branch (or manual via gcloud builds submit)
# ============================================================

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/trade-ai:latest'
      - '.'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/trade-ai:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trade-ai'
      - '--image=gcr.io/$PROJECT_ID/trade-ai:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--concurrency=80'
      - '--cpu-throttling'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,POLYMARKET_WS_AUTOSTART=true,MOLTBOOK_ENGINE=karma,MOLTBOOK_ACTIVE_MODE=karma'
      - '--set-secrets=NEXT_PUBLIC_SUPABASE_URL=NEXT_PUBLIC_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=NEXT_PUBLIC_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,MEXC_API_KEY=MEXC_API_KEY:latest,MEXC_API_SECRET=MEXC_API_SECRET:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,DASHBOARD_PASSWORD=DASHBOARD_PASSWORD:latest,AUTH_SECRET=AUTH_SECRET:latest,CRON_SECRET=CRON_SECRET:latest,POLYMARKET_API_KEY=POLYMARKET_API_KEY:latest,POLYMARKET_CLOB_URL=POLYMARKET_CLOB_URL:latest,POLYMARKET_GAMMA_URL=POLYMARKET_GAMMA_URL:latest,SWARM_TOKEN=SWARM_TOKEN:latest,MOLTBOOK_API_KEY=MOLTBOOK_API_KEY:latest,METRICS_TOKEN=METRICS_TOKEN:latest'

images:
  - 'gcr.io/$PROJECT_ID/trade-ai:latest'

options:
  logging: LEGACY

timeout: '1200s'
