# ============================================================
# PHOENIX V2 — Google Cloud Build Configuration
# Builds Docker image and deploys to Cloud Run automatically.
#
# Trigger: Push to main branch (or manual via gcloud builds submit)
# ============================================================

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/trade-ai:latest'
      - '.'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/trade-ai:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'trade-ai'
      - '--image=gcr.io/$PROJECT_ID/trade-ai:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--concurrency=80'
      - '--cpu-throttling'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/trade-ai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
