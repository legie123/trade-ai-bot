name: Admin Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to execute (e.g., gladiators:reset-stats)'
        required: true
        type: string
      reason:
        description: 'Reason for the command'
        required: false
        default: 'admin-dispatch'
        type: string

env:
  SERVICE_URL: https://trade-ai-657910053930.europe-west1.run.app

jobs:
  execute:
    name: Execute Admin Command
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get CRON_SECRET from Cloud Run service env
        id: secret
        run: |
          # Cloud Run service has secrets mounted as env vars via --set-secrets
          # Extract the secret value name, then access it from Secret Manager
          # First try direct secret manager access, fallback to Cloud Run describe
          CRON_SECRET=$(gcloud run services describe trade-ai \
            --region=europe-west1 \
            --project=evident-trees-453923-f9 \
            --format='value(spec.template.spec.containers[0].env.filter(name=CRON_SECRET).value)' 2>/dev/null) || true

          if [ -z "$CRON_SECRET" ]; then
            # Secrets are mounted from Secret Manager, not plain env vars
            # Use Cloud Run proxy to call the service with identity token
            CRON_SECRET=""
          fi

          if [ -n "$CRON_SECRET" ]; then
            echo "::add-mask::$CRON_SECRET"
            echo "cron_secret=$CRON_SECRET" >> $GITHUB_OUTPUT
            echo "method=env" >> $GITHUB_OUTPUT
          else
            echo "method=identity" >> $GITHUB_OUTPUT
          fi

      - name: Execute Command (with CRON_SECRET)
        if: steps.secret.outputs.method == 'env'
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ env.SERVICE_URL }}/api/v2/command" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ steps.secret.outputs.cron_secret }}" \
            -d '{"command":"${{ inputs.command }}","params":{"reason":"${{ inputs.reason }}"}}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Command failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Execute Command (with identity token)
        if: steps.secret.outputs.method == 'identity'
        run: |
          # Use service account identity to get an ID token for Cloud Run
          TOKEN=$(gcloud auth print-identity-token --audiences="${{ env.SERVICE_URL }}" 2>/dev/null) || true

          if [ -z "$TOKEN" ]; then
            echo "::error::Cannot obtain identity token. SA needs roles/run.invoker."
            exit 1
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ env.SERVICE_URL }}/api/v2/command" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"command":"${{ inputs.command }}","params":{"reason":"${{ inputs.reason }}"}}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Command failed with HTTP $HTTP_CODE"
            exit 1
          fi
