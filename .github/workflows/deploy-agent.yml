name: Deploy Grafana Agent

# Manual trigger only — infra change, don't auto-redeploy on every app commit.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you redeploying the agent? (config change, image upgrade, etc.)'
        required: true
        default: 'config update'

env:
  PROJECT_ID: evident-trees-453923-f9
  REGION: europe-west1
  SERVICE: grafana-agent

jobs:
  deploy-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: evident-trees-453923-f9

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build & Push image
        run: |
          echo "Reason: ${{ inputs.reason }}"
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_SHA="gcr.io/$PROJECT_ID/$SERVICE:$SHORT_SHA"
          IMAGE_LATEST="gcr.io/$PROJECT_ID/$SERVICE:latest"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" ./grafana-agent
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "IMAGE_SHA=$IMAGE_SHA" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image="$IMAGE_SHA" \
            --region=$REGION \
            --platform=managed \
            --no-allow-unauthenticated \
            --min-instances=1 \
            --max-instances=1 \
            --cpu=1 \
            --memory=512Mi \
            --no-cpu-throttling \
            --execution-environment=gen2 \
            --port=8080 \
            --set-secrets="METRICS_TOKEN=METRICS_TOKEN:latest,GRAFANA_REMOTE_WRITE_URL=GRAFANA_REMOTE_WRITE_URL:latest,GRAFANA_PROM_USERNAME=GRAFANA_PROM_USERNAME:latest,GRAFANA_PROM_API_KEY=GRAFANA_PROM_API_KEY:latest" \
            --project=$PROJECT_ID

      - name: Verify service
        run: |
          gcloud run services describe $SERVICE \
            --region=$REGION \
            --project=$PROJECT_ID \
            --format='value(status.url,status.latestReadyRevisionName)'
